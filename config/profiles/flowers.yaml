name: "Цветочный бизнес"
aliases: ["flowers", "florist", "цветы", "флорист", "цветочный"]
currency: RUB
language: ru

categories:
  business:
    - name: "Закупка цветов"
      icon: "💐"
      scope: business
    - name: "Упаковка"
      icon: "🎁"
      scope: business
    - name: "Доставка"
      icon: "🚚"
      scope: business
    - name: "Аренда"
      icon: "🏪"
      scope: business
    - name: "Коммунальные"
      icon: "💡"
      scope: business
    - name: "Реклама"
      icon: "📣"
      scope: business
    - name: "Оборудование"
      icon: "🔧"
      scope: business
    - name: "Холодильник/хранение"
      icon: "❄️"
      scope: business

reports:
  - type: monthly
    name: "Месячный отчёт"

metrics:
  - key: expense_ratio
    label: "% расходов от дохода"
    formula: "total_expenses / total_income * 100"
  - key: net_profit_margin
    label: "Чистая маржа"
    formula: "(total_income - total_expenses) / total_income * 100"

special_features:
  ifta: false
  loads_tracking: false

specialist:
  greeting:
    ru: "Добрый день! Цветочный магазин, чем могу помочь?"
    en: "Hello! Flower shop, how can I help?"
  services:
    - name: "Букет на заказ"
      duration_min: 30
      price: 3000
      currency: "RUB"
      description: "Индивидуальный букет по вашему пожеланию"
    - name: "Свадебная флористика"
      duration_min: 60
      description: "Консультация и оформление свадьбы"
    - name: "Доставка букета"
      duration_min: 60
      price: 500
      currency: "RUB"
    - name: "Оформление помещения"
      duration_min: 120
      description: "Декорирование цветами для мероприятий"
  staff:
    - name: "Флорист 1"
      specialties: ["букеты", "свадьбы"]
    - name: "Флорист 2"
      specialties: ["оформление", "композиции"]
  working_hours:
    default: "09:00-20:00"
    sun: "10:00-16:00"
  capabilities:
    - booking
    - price_inquiry
    - faq
    - reminder
  faq:
    - q: "За сколько дней нужно заказывать свадебную флористику?"
      a: "Рекомендуем за 2-4 недели, чтобы обсудить все детали."
    - q: "Есть доставка?"
      a: "Да, доставка по городу — 500 руб."
  system_prompt_extra: |
    Ты — консультант цветочного магазина.
    Помогай с выбором букетов и оформлением заказов.
    Уточняй повод, бюджет и предпочтения по цветам.
