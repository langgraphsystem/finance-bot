# Skill catalog for progressive skill loading.
#
# Instead of loading all 68+ skill descriptions into the intent prompt,
# the supervisor first classifies the domain, then loads only the relevant
# skill group (~2K tokens vs ~40K for full catalog).
#
# Each domain group defines:
#   - description: one-line summary for the supervisor prompt
#   - triggers: keywords that hint at this domain (used for fast routing)
#   - agent: which agent handles this domain
#   - skills: list of intent names in this group

domains:
  finance:
    description: "Track expenses, income, budgets, recurring payments, category corrections"
    triggers:
      - expense
      - income
      - budget
      - receipt
      - scan
      - категори
      - расход
      - доход
      - бюджет
      - чек
    agent: chat
    skills:
      - add_expense
      - add_income
      - correct_category
      - undo_last
      - set_budget
      - mark_paid
      - add_recurring
      - delete_data

  analytics:
    description: "Financial reports, statistics, complex queries, spending analysis"
    triggers:
      - report
      - statistic
      - analytic
      - compare
      - trend
      - отчёт
      - статистик
      - сравни
    agent: analytics
    skills:
      - query_stats
      - complex_query
      - query_report

  finance_specialist:
    description: "Financial summaries, invoices, tax estimates, cash flow forecasts"
    triggers:
      - summary
      - invoice
      - инвойс
      - счёт
      - tax
      - налог
      - forecast
      - прогноз
      - afford
      - хватит
    agent: finance_specialist
    skills:
      - financial_summary
      - generate_invoice
      - tax_estimate
      - cash_flow_forecast

  receipt:
    description: "Scan receipts from photos"
    triggers:
      - receipt
      - чек
      - фото чека
    agent: receipt
    skills:
      - scan_receipt

  document:
    description: "Scan documents, convert formats, extract tables, generate invoices/spreadsheets, analyze and compare documents"
    triggers:
      - document
      - pdf
      - word
      - excel
      - scan
      - скан
      - документ
      - таблиц
      - шаблон
      - template
      - convert
      - конверт
      - extract
      - извлечь
      - spreadsheet
      - docx
      - xlsx
      - фото
      - photo
    agent: document
    skills:
      - scan_document
      - convert_document
      - list_documents
      - search_documents
      - extract_table
      - generate_invoice_pdf

  tasks:
    description: "Create tasks, reminders, to-do lists, shopping lists"
    triggers:
      - task
      - remind
      - todo
      - shopping
      - list
      - задач
      - напомн
      - список
      - покупк
    agent: tasks
    skills:
      - create_task
      - list_tasks
      - set_reminder
      - complete_task
      - shopping_list_add
      - shopping_list_view
      - shopping_list_remove
      - shopping_list_clear

  life:
    description: "Track food, drinks, mood; day planning and reflection; life journal"
    triggers:
      - food
      - drink
      - mood
      - plan
      - reflect
      - capture
      - journal
      - еда
      - напит
      - настроен
      - план
      - memory
      - forget
      - remember
      - память
      - забыть
      - запомни
      - воспоминан
    agent: life
    skills:
      - quick_capture
      - track_food
      - track_drink
      - mood_checkin
      - day_plan
      - day_reflection
      - life_search
      - set_comm_mode
      - evening_recap
      - price_alert
      - news_monitor
      - memory_show
      - memory_forget
      - memory_save

  email:
