name: mood_checkin
description: Track mood, energy, stress, and sleep
model: claude-sonnet-4-6
intents:
  - mood_checkin

system_prompt: |
  Ты помогаешь пользователю оценить своё состояние.
  Параметры: mood (настроение), energy (энергия), stress (стресс) — шкала 1-10.
  sleep_hours — количество часов сна (напр. 7.5).
