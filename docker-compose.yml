services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: .
    command:
      [
        "python",
        "-m",
        "taskiq",
        "worker",
        "src.core.tasks.broker:broker",
        "src.core.tasks.memory_tasks",
        "src.core.tasks.notification_tasks",
        "src.core.tasks.life_tasks",
        "src.core.tasks.reminder_tasks",
        "src.core.tasks.profile_tasks",
        "src.core.tasks.proactivity_tasks",
        "src.core.tasks.booking_tasks",
        "src.core.tasks.document_tasks",
        "src.core.tasks.crossdomain_tasks",
        "src.core.tasks.billing_tasks",
        "src.core.tasks.scheduled_action_tasks",
        "src.core.tasks.release_ops_tasks",
      ]
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  scheduler:
    build: .
    command:
      [
        "python",
        "-m",
        "taskiq",
        "scheduler",
        "src.core.tasks.broker:scheduler",
        "src.core.tasks.memory_tasks",
        "src.core.tasks.notification_tasks",
        "src.core.tasks.life_tasks",
        "src.core.tasks.reminder_tasks",
        "src.core.tasks.profile_tasks",
        "src.core.tasks.proactivity_tasks",
        "src.core.tasks.booking_tasks",
        "src.core.tasks.document_tasks",
        "src.core.tasks.crossdomain_tasks",
        "src.core.tasks.billing_tasks",
        "src.core.tasks.scheduled_action_tasks",
        "src.core.tasks.release_ops_tasks",
      ]
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
