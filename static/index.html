<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stridos | Your AI Life Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <a href="/" class="logo">
            <div class="logo-icon">S</div>
            <span>Stridos</span>
        </a>
        <div class="nav-links">
            <a href="#features">Features</a>
            <a href="#integrations">Integrations</a>
            <a href="#pricing">Pricing</a>
            <a href="#blog">Blog</a>
        </div>
        <a href="https://t.me/YourBotName" class="btn btn-cta">Get Started Free</a>
        <button class="mobile-menu-btn" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <!-- Hero -->

        <div class="hero-content">
            <h1 class="hero-title">Your AI Life<br>Assistant</h1>
            <p class="hero-subtitle">The best of every AI &mdash; working together for you.</p>
            <div class="hero-buttons">
                <a href="https://t.me/YourBotName" class="btn btn-primary">Start for Free</a>
                <a href="#features" class="btn btn-outline">Learn More</a>

        </div>

            <!-- Floating Channel Icons — Right side -->
            <div class="channel-icon channel-sms-green">SMS</div>

            <!-- Bottom-left SMS (same green style) -->
            <div class="channel-icon channel-sms-red">SMS</div>

            <!-- Phone Background Animation (Remotion-rendered) -->
            <video class="hero-bg-video" autoplay loop muted playsinline>
                <source src="hero-bg.webm" type="video/webm">
            </video>

            <!-- Phone Mockup (Gemini-generated realistic image) -->
            <img src="phone-mockup.png" alt="Stridos AI Assistant on iPhone" class="phone-mockup-img">

            <!-- AI Models Card (no labels, just icons + text) -->
            <div class="ai-models-card">
                <div class="ai-models-row">
                    <div class="ai-icon ai-claude">

                    </div>
                </div>
                <p class="ai-models-label">Powered by the world's most advanced AI</p>
            </div>

            <!-- Sparkle icon bottom-right -->
            <div class="sparkle-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M12 2L13.5 8.5L20 10L13.5 11.5L12 18L10.5 11.5L4 10L10.5 8.5L12 2Z" fill="rgba(108,92,231,0.15)" stroke="rgba(108,92,231,0.3)" stroke-width="0.5"/></svg>

    <script src="script.js"></script>
